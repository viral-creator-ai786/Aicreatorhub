<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Creator Hub - 100% Free</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .main-box {
            background-color: #1f2833;
            border-radius: 12px;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0 4px 20px rgba(102, 252, 241, 0.2);
        }
        h1 {
            color: #66fcf1;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #858688;
            font-size: 14px;
        }
        input {
            width: 85%;
            padding: 12px;
            border: 2px solid #45f3ff;
            background-color: #0b0c10;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 20px;
            outline: none;
        }
        button {
            background-color: #66fcf1;
            color: #0b0c10;
            font-weight: bold;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 92%;
            box-shadow: 0 4px 10px rgba(102, 252, 241, 0.3);
            margin-bottom: 20px;
        }
        button:active {
            transform: scale(0.98);
        }
        #outputBox {
            display: none; 
            text-align: left; 
            padding: 15px; 
            background: #0b0c10; 
            border: 1px solid #66fcf1; 
            border-radius: 8px;
            margin-top: 10px;
        }
        .output-title { color: #66fcf1; margin-top: 0; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>AI Creator Hub</h1>
        <p>Get Viral Scripts, Titles & 3D Thumbnail Prompts Instantly</p>
        
        <input type="text" id="topicInput" placeholder="Enter Topic (e.g., Free Fire 1v4 Clutch)">
        <br>
        
        <button onclick="generateViralPack()">Generate Viral Pack</button>

        <div id="outputBox">
            <h3 class="output-title">🔥 Your Viral Pack is Ready:</h3>
            <p><span class="highlight">🎬 Script (60s):</span> <br><span id="outScript"></span></p>
            <p><span class="highlight">🏷️ Viral Tags:</span> <br><span id="outTags"></span></p>
            <p><span class="highlight">🎨 Thumbnail Prompt:</span> <br><span id="outThumb"></span></p>
        </div>
    </div>

    <script>
        function generateViralPack() {
            try {
                // Topic validation
                let topic = document.getElementById('topicInput').value;
                if(topic === "") { 
                    alert("Error: Please enter a topic first!"); 
                    return; 
                }

                // Credit Limit Logic
                let today = new Date().toLocaleDateString();
                let currentUsage = localStorage.getItem("usage_" + today);
                
                if (currentUsage === null) {
                    currentUsage = 0;
                } else {
                    currentUsage = parseInt(currentUsage);
                }
                
                let maxLimit = 3;
                if (currentUsage >= maxLimit) {
                    alert("Limit Reached! Aapne aaj ke 3 free credits use kar liye hain. Kal wapas aayen ya doston ke sath share karein!");
                    return; 
                }

                let tagWord = topic.replace(/\s+/g, '');
                
                // Content Generation
                document.getElementById('outputBox').style.display = 'block';
                document.getElementById('outScript').innerText = "Kya aapko pata hai " + topic + " ka sabse bada secret kya hai? 99% log ye galti karte hain. Is video me dekho kaise pro players ye trick use karte hain!";
                document.getElementById('outTags').innerText = "#Shorts #Viral #" + tagWord + " #Gaming #Trending";
                document.getElementById('outThumb').innerText = "Epic 3D render of " + topic + ", glowing neon lights, intense action, 16:9 aspect ratio, 8k resolution.";

                // Save usage
                currentUsage++;
                localStorage.setItem("usage_" + today, currentUsage);
                let remainingCredits = maxLimit - currentUsage;

                alert("Success! Your content is generated. Remaining free credits today: " + remainingCredits);

            } catch (error) {
                alert("System Error: " + error.message);
            }
        }
    </script>

</body>
</html>
